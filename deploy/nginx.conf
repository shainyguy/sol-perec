# Nginx конфигурация для кафе «Соль и Перец»
# Файл: /etc/nginx/sites-available/sol-perec
# Активировать: ln -s /etc/nginx/sites-available/sol-perec /etc/nginx/sites-enabled/
# Проверить: nginx -t
# Перезапустить: systemctl reload nginx

server {
    listen 80;
    server_name ВАШ_ДОМЕН.ru www.ВАШ_ДОМЕН.ru;

    # Редирект на HTTPS (раскомментировать после настройки SSL)
    # return 301 https://$host$request_uri;

    # Проксирование на Node.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Кэширование статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_cache_valid  200 7d;
        add_header         Cache-Control "public, max-age=604800";
        expires            7d;
    }

    # Gzip сжатие
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}

